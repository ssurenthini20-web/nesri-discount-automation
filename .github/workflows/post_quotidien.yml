name: Envoi Automatique Sélection Produits

on:
  schedule:
    # 05:00 UTC correspond à 07:00 du matin en France en été
    - cron: '0 5 * * *'
  workflow_dispatch: # Permet de le lancer aussi manuellement sur GitHub si besoin

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    # Donne l'autorisation au robot d'écrire et de push sur le dépôt
    permissions:
      contents: write

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v3

    - name: Installer Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install notebook nbconvert requests pillow groq python-dotenv pandas

    - name: Exécuter le Notebook Python
      env:
        GMAIL_EXPEDITEUR: ${{ secrets.GMAIL_EXPEDITEUR }}
        GMAIL_MOT_DE_PASSE: ${{ secrets.GMAIL_MOT_DE_PASSE }}
        GMAIL_DESTINATAIRE: ${{ secrets.GMAIL_DESTINATAIRE }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        jupyter nbconvert --to notebook --execute 02_Notebooks_Python/test_shopify_corrige.ipynb --output test_shopify_corrige_output.ipynb

    - name: Uploader le notebook exécuté pour debug
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: notebook-output
        path: 02_Notebooks_Python/test_shopify_corrige_output.ipynb

    - name: Sauvegarder l'avancement du compteur de produits
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Ajoute automatiquement tous les compteurs pour qu'ils soient enregistrés
        git add **/compteur_rotation*.txt || git add compteur_rotation*.txt || true
        
        # Le "[skip ci]" évite que cette sauvegarde automatique ne relance le script à l'infini
        git commit -m "🔄 Auto: Mise à jour des compteurs de rotation [skip ci]" || echo "Aucun changement à sauvegarder"
        
        git push origin main
