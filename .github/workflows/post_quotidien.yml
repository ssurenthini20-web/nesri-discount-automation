name: Envoi Automatique Sélection Produits

on:
  schedule:
    # 05:00 UTC correspond à 07:00 du matin en France en été
    - cron: '0 5 * * *'
  workflow_dispatch: # Permet de le lancer aussi manuellement sur GitHub si besoin

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v3

    - name: Installer Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install notebook nbconvert requests pillow groq python-dotenv

    - name: Exécuter le Notebook Python
      env:
        GMAIL_EXPEDITEUR: ${{ secrets.GMAIL_EXPEDITEUR }}
        GMAIL_MOT_DE_PASSE: ${{ secrets.GMAIL_MOT_DE_PASSE }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        jupyter nbconvert --to notebook --execute 02_Notebooks_Python/test_shopify_corrige.ipynb --output 02_Notebooks_Python/test_shopify_corrige_output.ipynb

    - name: Sauvegarder l'avancement du compteur de produits
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add compteur_produits.txt || true
        git commit -m "🔄 Mise à jour automatique du compteur de produits" || true
        git push || true
        
